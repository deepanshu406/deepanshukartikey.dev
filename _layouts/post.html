---
layout: default
---
<div class="post-header">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%B %-d, %Y" }}
    {% if page.tags %} &middot; {{ page.tags | join: ", " }}{% endif %}
    {% if page.external_url %} &middot; <a href="{{ page.external_url }}" target="_blank">Read on {{ page.source }}</a>{% endif %}
  </div>
</div>

<div class="post-body">
  {{ content }}
</div>

<p style="margin-top:32px;font-size:13px;color:#999;">
  &larr; <a href="/blog/">Back to blog</a>
</p>
