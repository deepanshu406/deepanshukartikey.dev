const PAGE_SIZE = 10;
let shown = 0;
const list = document.getElementById('commits-list');
const loadBtn = document.getElementById('load-more-btn');
const loadingMsg = document.getElementById('loading-msg');
const errorMsg = document.getElementById('error-msg');

function renderPatch(p) {
  const githubUrl = `https://github.com/torvalds/linux/commit/${p.hash}`;
  const shortHash = p.hash.substring(0, 7);
  const title = p.lkml
    ? `<a href="${p.lkml}" target="_blank">${p.subject}</a>`
    : p.subject;
  return `<li>
    <div>
      <span class="patch-subsystem">${p.subsystem}</span> — ${title}
      &nbsp;<span class="patch-hash"><a href="${githubUrl}" target="_blank">${shortHash}</a></span>
    </div>
    <div class="patch-meta">${p.meta}</div>
  </li>`;
}

function showMore() {
  const next = ALL_PATCHES.slice(shown, shown + PAGE_SIZE);
  next.forEach(p => {
    list.insertAdjacentHTML('beforeend', renderPatch(p));
  });
  shown += next.length;
  if (shown >= ALL_PATCHES.length) {
    loadBtn.style.display = 'none';
  } else {
    loadBtn.style.display = 'inline-block';
    loadBtn.textContent = `Load more patches (${ALL_PATCHES.length - shown} remaining) ↓`;
  }
}

loadingMsg.style.display = 'none';
showMore();
loadBtn.addEventListener('click', showMore);
</script>
